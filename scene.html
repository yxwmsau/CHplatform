<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式场景 · 星火赤江</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #172033;
            --muted: #62708a;
            --paper: #f5f1e8;
            --panel: rgba(255, 250, 242, 0.95);
            --accent: #9a2f24;
            --accent-dark: #79231b;
            --line: rgba(23, 32, 51, 0.12);
            --shadow: 0 30px 60px -24px rgba(18, 24, 39, 0.45);
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(154, 47, 36, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(227, 190, 127, 0.22), transparent 28%),
                linear-gradient(135deg, #efe6d4, #f8f5ee 42%, #e9eef4 100%);
        }

        .page-shell {
            max-width: none;
            margin: 0 auto;
            padding: 1rem 1.25rem 1.5rem;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .back-link,
        .detail-link {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.7rem 1.2rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
            text-decoration: none;
            border: 1px solid rgba(23, 32, 51, 0.08);
            box-shadow: 0 10px 24px -16px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
        }

        .detail-link {
            background: var(--accent);
            color: #fff;
        }

        .detail-link:hover {
            background: var(--accent-dark);
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            align-items: stretch;
        }

        .viewer-card,
        .info-card,
        .guide-card,
        .related-card {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .viewer-card {
            position: relative;
            overflow: hidden;
            min-height: calc(100vh - 7.5rem);
            border-radius: 36px;
            background: linear-gradient(180deg, rgba(17, 25, 39, 0.8), rgba(17, 25, 39, 0.2));
        }

        .viewer-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .scene-image {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110%;
            max-width: none;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            user-select: none;
            -webkit-user-drag: none;
            filter: saturate(1.03) contrast(1.02);
        }

        .scene-embed {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #0f1720;
        }

        .scene-cesium {
            position: absolute;
            inset: 0;
            background: #0f1720;
        }

        .scene-cesium[hidden] {
            display: none;
        }

        .scene-cesium .cesium-viewer,
        .scene-cesium .cesium-viewer-cesiumWidget,
        .scene-cesium .cesium-widget,
        .scene-cesium canvas {
            width: 100%;
            height: 100%;
        }

        .scene-cesium .cesium-viewer-toolbar,
        .scene-cesium .cesium-viewer-animationContainer,
        .scene-cesium .cesium-viewer-timelineContainer,
        .scene-cesium .cesium-viewer-bottom,
        .scene-cesium .cesium-viewer-fullscreenContainer {
            display: none;
        }

        .viewer-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(8, 11, 18, 0.6), transparent 30%, transparent 72%, rgba(8, 11, 18, 0.7));
            pointer-events: none;
        }

        .viewer-header {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            right: 1.25rem;
            z-index: 3;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .viewer-title {
            max-width: 520px;
            padding: 1rem 1.1rem;
            border-radius: 24px;
            background: rgba(255, 247, 238, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #fff8ed;
            backdrop-filter: blur(10px);
        }

        .viewer-title h1 {
            font-size: 2rem;
            margin-bottom: 0.4rem;
            line-height: 1.1;
        }

        .viewer-title p {
            color: rgba(255, 248, 237, 0.82);
            font-size: 0.96rem;
            line-height: 1.6;
        }

        .viewer-tools {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .viewer-badges {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .asset-switch {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
            margin-top: 0.85rem;
        }

        .asset-switch[hidden] {
            display: none;
        }

        .asset-switch-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.55rem 0.8rem;
            border-radius: 999px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 248, 237, 0.1);
            color: rgba(255, 248, 237, 0.9);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .asset-switch-link.active {
            background: rgba(255, 248, 237, 0.92);
            color: var(--ink);
        }

        .viewer-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.7rem;
            border-radius: 999px;
            background: rgba(255, 248, 237, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 248, 237, 0.88);
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .tool-btn {
            border: none;
            border-radius: 18px;
            padding: 0.8rem 0.95rem;
            background: rgba(255, 250, 242, 0.88);
            color: var(--ink);
            font-weight: 600;
            cursor: pointer;
            min-width: 48px;
            box-shadow: 0 10px 20px -16px rgba(0, 0, 0, 0.35);
        }

        .tool-btn:hover {
            background: #fff;
        }

        .tool-btn[hidden] {
            display: none;
        }

        .immersive-stops {
            position: absolute;
            left: 50%;
            bottom: 5.9rem;
            transform: translateX(-50%);
            z-index: 4;
            width: min(980px, calc(100% - 3rem));
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding: 0.2rem;
            scrollbar-width: none;
        }

        .immersive-stops::-webkit-scrollbar {
            display: none;
        }

        .stop-pill {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            min-width: 210px;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(10, 14, 24, 0.52);
            color: rgba(255, 248, 237, 0.92);
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 34px -24px rgba(0, 0, 0, 0.8);
        }

        .stop-pill.active {
            background: rgba(255, 248, 237, 0.94);
            color: var(--ink);
        }

        .stop-pill-index {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(154, 47, 36, 0.18);
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            flex: 0 0 auto;
        }

        .stop-pill.active .stop-pill-index {
            background: rgba(154, 47, 36, 0.12);
        }

        .stop-pill-copy {
            min-width: 0;
            text-align: left;
        }

        .stop-pill-copy strong,
        .stop-pill-copy span {
            display: block;
        }

        .stop-pill-copy strong {
            font-size: 0.9rem;
            margin-bottom: 0.18rem;
        }

        .stop-pill-copy span {
            font-size: 0.78rem;
            line-height: 1.5;
            color: inherit;
            opacity: 0.84;
        }

        .immersive-dock {
            position: absolute;
            left: 50%;
            bottom: 1.25rem;
            transform: translateX(-50%);
            z-index: 4;
            display: inline-flex;
            gap: 0.55rem;
            padding: 0.45rem;
            border-radius: 999px;
            background: rgba(9, 12, 20, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            box-shadow: 0 22px 42px -24px rgba(0, 0, 0, 0.82);
        }

        .dock-btn {
            border: none;
            border-radius: 999px;
            padding: 0.72rem 1rem;
            background: transparent;
            color: rgba(255, 248, 237, 0.92);
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .dock-btn.active,
        .dock-btn:hover {
            background: rgba(255, 248, 237, 0.94);
            color: var(--ink);
        }

        .immersive-drawer {
            position: fixed;
            left: 50%;
            bottom: 1rem;
            width: min(1180px, calc(100vw - 1.5rem));
            max-height: min(44vh, 420px);
            transform: translate(-50%, calc(100% + 1rem));
            opacity: 0;
            pointer-events: none;
            z-index: 40;
            border-radius: 28px;
            background: rgba(255, 249, 241, 0.96);
            border: 1px solid rgba(23, 32, 51, 0.08);
            box-shadow: 0 30px 80px -24px rgba(16, 23, 38, 0.55);
            backdrop-filter: blur(16px);
            transition: transform 0.22s ease, opacity 0.22s ease;
            overflow: hidden;
        }

        .immersive-drawer.open {
            transform: translate(-50%, 0);
            opacity: 1;
            pointer-events: auto;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.1rem 1.2rem 0.9rem;
            border-bottom: 1px solid rgba(23, 32, 51, 0.08);
        }

        .drawer-header h2 {
            font-size: 1.2rem;
            line-height: 1.2;
            margin-bottom: 0.2rem;
        }

        .drawer-subtitle {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .drawer-close {
            border: none;
            background: rgba(23, 32, 51, 0.06);
            color: var(--ink);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            flex: 0 0 auto;
        }

        .drawer-content {
            padding: 1rem 1.2rem 1.2rem;
            overflow: auto;
            max-height: calc(min(44vh, 420px) - 76px);
        }

        .drawer-section {
            display: none;
        }

        .drawer-section.active {
            display: block;
        }

        .scene-summary-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 1rem;
        }

        .scene-summary-main,
        .scene-summary-meta {
            padding: 1rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(23, 32, 51, 0.08);
        }

        .scene-summary-main h3 {
            font-size: 1.3rem;
            margin-bottom: 0.35rem;
        }

        .scene-summary-main p,
        .scene-summary-meta p {
            color: #34415a;
            line-height: 1.7;
        }

        .scene-hotspots {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .hotspot-btn {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 245, 228, 0.95);
            background: var(--accent);
            box-shadow: 0 0 0 10px rgba(154, 47, 36, 0.16), 0 10px 20px -10px rgba(0, 0, 0, 0.65);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .hotspot-btn::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 248, 237, 0.45);
        }

        .hotspot-btn:hover,
        .hotspot-btn.active {
            transform: translate(-50%, -50%) scale(1.12);
            background: #cb4e3f;
            box-shadow: 0 0 0 12px rgba(203, 78, 63, 0.18), 0 14px 24px -12px rgba(0, 0, 0, 0.72);
        }

        .hotspot-label {
            position: absolute;
            top: calc(100% + 0.75rem);
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            background: rgba(255, 248, 237, 0.92);
            color: var(--ink);
            font-size: 0.78rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .hotspot-btn:hover .hotspot-label,
        .hotspot-btn.active .hotspot-label {
            opacity: 1;
        }

        .viewer-footer {
            position: absolute;
            left: 1.25rem;
            right: 1.25rem;
            bottom: 1.25rem;
            z-index: 3;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-end;
        }

        .scene-tip,
        .camera-readout {
            border-radius: 22px;
            padding: 0.95rem 1rem;
            background: rgba(13, 19, 32, 0.58);
            color: rgba(255, 248, 237, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .scene-tip {
            max-width: 420px;
        }

        .scene-tip strong,
        .camera-readout strong {
            display: block;
            margin-bottom: 0.35rem;
            color: #fff;
        }

        .camera-readout {
            min-width: 230px;
            text-align: right;
        }

        .side-panel {
            display: grid;
            grid-template-columns: minmax(260px, 0.9fr) minmax(260px, 0.9fr) minmax(320px, 1.2fr);
            gap: 1rem;
            align-items: start;
        }

        .info-card,
        .guide-card,
        .related-card {
            border-radius: 32px;
            padding: 1.35rem;
            min-height: 100%;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .info-card h2 {
            font-size: 1.75rem;
            line-height: 1.15;
            margin-bottom: 0.45rem;
        }

        .info-card .meta {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        .info-card p {
            color: #34415a;
            line-height: 1.75;
            font-size: 0.96rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .stat-chip {
            padding: 0.85rem 0.9rem;
            border-radius: 18px;
            background: rgba(154, 47, 36, 0.06);
            border: 1px solid rgba(154, 47, 36, 0.08);
        }

        .stat-chip span {
            display: block;
            color: var(--muted);
            font-size: 0.75rem;
            margin-bottom: 0.35rem;
        }

        .stat-chip strong {
            font-size: 0.95rem;
        }

        .guide-list {
            display: grid;
            gap: 0.8rem;
        }

        .guide-item {
            display: flex;
            gap: 0.9rem;
            align-items: flex-start;
            padding: 0.9rem;
            border-radius: 20px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            cursor: pointer;
            transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .guide-item:hover,
        .guide-item.active {
            border-color: rgba(154, 47, 36, 0.28);
            transform: translateY(-1px);
            box-shadow: 0 16px 28px -24px rgba(24, 29, 39, 0.65);
        }

        .guide-index {
            width: 34px;
            height: 34px;
            flex: 0 0 auto;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(154, 47, 36, 0.1);
            color: var(--accent);
            font-weight: 700;
        }

        .guide-item h3 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .guide-item p {
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.88rem;
        }

        .related-tabs {
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .related-tab {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            border-radius: 999px;
            padding: 0.55rem 0.9rem;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
        }

        .related-tab.active {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }

        .related-body {
            display: grid;
            gap: 0.9rem;
        }

        .related-panel {
            display: none;
        }

        .related-panel.active {
            display: grid;
            gap: 0.8rem;
        }

        .timeline-item,
        .media-item,
        .drawing-item-small {
            padding: 0.9rem 1rem;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.74);
        }

        .timeline-item strong,
        .media-item strong,
        .drawing-item-small strong {
            display: block;
            margin-bottom: 0.35rem;
        }

        .timeline-item span,
        .media-item span,
        .drawing-item-small span {
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .media-item img {
            width: 100%;
            border-radius: 16px;
            margin-top: 0.7rem;
            aspect-ratio: 16 / 9;
            object-fit: cover;
        }

        .empty-state {
            padding: 1.1rem;
            border-radius: 18px;
            border: 1px dashed var(--line);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.54);
        }

        @media (max-width: 1280px) {
            .scene-summary-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1120px) {
            .viewer-card {
                min-height: 62vh;
            }

            .viewer-footer {
                bottom: 7.25rem;
            }

            .immersive-stops {
                bottom: 6rem;
                width: calc(100% - 1.5rem);
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 1rem;
            }

            .viewer-card {
                min-height: 70vh;
                border-radius: 28px;
            }

            .viewer-title h1 {
                font-size: 1.5rem;
            }

            .viewer-footer {
                flex-direction: column;
                align-items: stretch;
                bottom: 8.7rem;
            }

            .camera-readout {
                text-align: left;
                min-width: auto;
            }

            .viewer-header {
                flex-direction: column;
            }

            .viewer-tools {
                width: 100%;
                justify-content: flex-start;
            }

            .viewer-title {
                max-width: none;
            }

            .immersive-stops {
                bottom: 8.7rem;
                width: calc(100% - 1rem);
            }

            .stop-pill {
                min-width: 180px;
            }

            .immersive-dock {
                width: calc(100% - 1rem);
                justify-content: flex-start;
                overflow-x: auto;
                scrollbar-width: none;
            }

            .immersive-dock::-webkit-scrollbar {
                display: none;
            }

            .dock-btn {
                flex: 0 0 auto;
            }

            .immersive-drawer {
                width: calc(100vw - 0.8rem);
                max-height: 58vh;
            }

            .drawer-content {
                max-height: calc(58vh - 76px);
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <section class="viewer-card" id="viewerCard">
            <div class="viewer-stage" id="viewerStage">
                <img class="scene-image" id="sceneImage" src="" alt="沉浸式场景预览">
                <iframe class="scene-embed" id="viewerEmbed" hidden title="三维场景容器"></iframe>
                <div class="scene-cesium" id="viewerCesium" hidden aria-label="Cesium三维场景容器"></div>
                <div class="scene-hotspots" id="sceneHotspots"></div>
                <div class="viewer-fade"></div>
            </div>

            <div class="viewer-header">
                <div class="viewer-title">
                    <h1 id="sceneTitle">沉浸式场景</h1>
                    <p id="sceneIntro"></p>
                    <div class="viewer-badges">
                        <span class="viewer-badge"><i class="fas fa-cube"></i> <span id="viewerProvider">PROTOTYPE</span></span>
                        <span class="viewer-badge"><i class="fas fa-display"></i> <span id="viewerMode">IMAGE</span></span>
                    </div>
                    <div class="asset-switch" id="assetModeSwitch" hidden></div>
                </div>
                <div class="viewer-tools">
                    <a class="back-link" href="detail.html"><i class="fas fa-arrow-left"></i> 返回详情</a>
                    <a class="detail-link" id="archiveLink" href="detail.html"><i class="fas fa-book-open"></i> 查看档案</a>
                    <button class="tool-btn" id="rotateLeftBtn" type="button" title="向左旋转"><i class="fas fa-rotate-left"></i></button>
                    <button class="tool-btn" id="zoomOutBtn" type="button" title="缩小"><i class="fas fa-search-minus"></i></button>
                    <button class="tool-btn" id="zoomResetBtn" type="button" title="重置视角"><i class="fas fa-location-crosshairs"></i></button>
                    <button class="tool-btn" id="zoomInBtn" type="button" title="放大"><i class="fas fa-search-plus"></i></button>
                    <button class="tool-btn" id="rotateRightBtn" type="button" title="向右旋转"><i class="fas fa-rotate-right"></i></button>
                </div>
            </div>

            <div class="immersive-stops" id="immersiveStops"></div>

            <div class="immersive-dock" id="immersiveDock">
                <button class="dock-btn" type="button" data-drawer-target="scene"><i class="fas fa-cube"></i> 场景</button>
                <button class="dock-btn" type="button" data-drawer-target="guide"><i class="fas fa-route"></i> 节点</button>
                <button class="dock-btn" type="button" data-drawer-target="story"><i class="fas fa-scroll"></i> 故事</button>
                <button class="dock-btn" type="button" data-drawer-target="gallery"><i class="fas fa-images"></i> 照片</button>
                <button class="dock-btn" type="button" data-drawer-target="drawings"><i class="fas fa-drafting-compass"></i> 图纸</button>
                <button class="dock-btn" type="button" data-drawer-target="timeline"><i class="fas fa-clock"></i> 事件</button>
            </div>

            <div class="viewer-footer">
                <div class="scene-tip">
                    <strong>交互提示</strong>
                    <span id="sceneTipText">图片模式下支持拖拽与缩放；3D Tiles 模式下可直接旋转缩放模型，右侧导览节点继续联动档案面板。</span>
                </div>
                <div class="camera-readout">
                    <strong id="cameraLabel">当前镜头：入口导览</strong>
                    <span id="cameraHint">从入口镜头切入场景，作为首次浏览的主视角。</span>
                </div>
            </div>
        </section>
    </div>

    <section class="immersive-drawer" id="immersiveDrawer" aria-live="polite">
        <div class="drawer-header">
            <div>
                <span class="eyebrow" id="drawerEyebrow"><i class="fas fa-layer-group"></i> 沉浸式信息层</span>
                <h2 id="drawerTitleText">场景总览</h2>
                <p class="drawer-subtitle" id="drawerSubtitleText">按需打开信息，不打断主场景浏览。</p>
            </div>
            <button class="drawer-close" id="drawerCloseBtn" type="button" title="关闭信息层"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="drawer-content">
            <div class="drawer-section" id="drawer-scene">
                <div class="scene-summary-grid">
                    <div class="scene-summary-main">
                        <span class="eyebrow"><i class="fas fa-cube"></i> 场景信息</span>
                        <h3 id="panelTitle">周老嘴革命旧址群</h3>
                        <div class="meta" id="panelMeta"></div>
                        <p id="panelDescription"></p>
                    </div>
                    <div class="scene-summary-meta">
                        <div class="stats-grid">
                            <div class="stat-chip">
                                <span>热点数量</span>
                                <strong id="statHotspots">0 个</strong>
                            </div>
                            <div class="stat-chip">
                                <span>图纸资源</span>
                                <strong id="statDrawings">0 张</strong>
                            </div>
                            <div class="stat-chip">
                                <span>历史事件</span>
                                <strong id="statTimeline">0 条</strong>
                            </div>
                            <div class="stat-chip">
                                <span>场景状态</span>
                                <strong>沉浸式浏览</strong>
                            </div>
                        </div>
                        <div class="stat-chip" style="margin-top:0.95rem;">
                            <span>查看器状态</span>
                            <strong id="viewerStatus">当前查看器尚未初始化。</strong>
                        </div>
                    </div>
                </div>
            </div>

            <div class="drawer-section" id="drawer-guide">
                <span class="eyebrow"><i class="fas fa-route"></i> 驻足节点</span>
                <div class="guide-list" id="guideList"></div>
            </div>

            <div class="drawer-section" id="drawer-related">
                <span class="eyebrow"><i class="fas fa-link"></i> 档案联动</span>
                <div class="related-tabs" id="relatedTabs">
                    <button class="related-tab active" type="button" data-panel="story">故事</button>
                    <button class="related-tab" type="button" data-panel="gallery">照片</button>
                    <button class="related-tab" type="button" data-panel="drawings">图纸</button>
                    <button class="related-tab" type="button" data-panel="timeline">事件</button>
                </div>
                <div class="related-body">
                    <div class="related-panel active" id="panel-story"></div>
                    <div class="related-panel" id="panel-gallery"></div>
                    <div class="related-panel" id="panel-drawings"></div>
                    <div class="related-panel" id="panel-timeline"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="data/app-data.js"></script>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
    <script src="js/scene-runtime.js"></script>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const sceneId = params.get('sceneId') || (window.XHCJ_DATA && window.XHCJ_DATA.featuredSceneId);
            const rawScene = window.XHCJ_DATA && window.XHCJ_DATA.getScene && window.XHCJ_DATA.getScene(sceneId);
            let scene = rawScene;
            if (!scene || !window.XHCJSceneRuntime) {
                return;
            }

            const immersive = scene.immersive || {};
            const viewerVariants = immersive.viewerVariants || {};
            const requestedAssetMode = params.get('assetMode');
            const defaultAssetMode = immersive.defaultAssetMode || '';
            const activeAssetMode = viewerVariants[requestedAssetMode] ? requestedAssetMode : (viewerVariants[defaultAssetMode] ? defaultAssetMode : '');

            if (activeAssetMode) {
                scene = {
                    ...scene,
                    immersive: {
                        ...immersive,
                        viewer: {
                            ...(immersive.viewer || {}),
                            ...viewerVariants[activeAssetMode]
                        }
                    }
                };
            }

            document.title = scene.name + ' · 沉浸式场景';

            const assetModeSwitch = document.getElementById('assetModeSwitch');
            const variantKeys = Object.keys(viewerVariants);
            if (assetModeSwitch && variantKeys.length) {
                assetModeSwitch.hidden = false;
                assetModeSwitch.innerHTML = variantKeys.map(function(key) {
                    const variant = viewerVariants[key] || {};
                    const nextParams = new URLSearchParams(window.location.search);
                    nextParams.set('sceneId', sceneId);
                    nextParams.set('assetMode', key);
                    return '<a class="asset-switch-link' + (key === activeAssetMode ? ' active' : '') + '" href="scene.html?' + nextParams.toString() + '">' + (variant.switchLabel || key) + '</a>';
                }).join('');
            }

            const runtime = window.XHCJSceneRuntime.create({
                scene: scene,
                elements: {
                    viewerCard: document.getElementById('viewerCard'),
                    archiveLink: document.getElementById('archiveLink'),
                    sceneTitle: document.getElementById('sceneTitle'),
                    sceneIntro: document.getElementById('sceneIntro'),
                    viewerStage: document.getElementById('viewerStage'),
                    sceneImage: document.getElementById('sceneImage'),
                    viewerEmbed: document.getElementById('viewerEmbed'),
                    viewerCesium: document.getElementById('viewerCesium'),
                    viewerProvider: document.getElementById('viewerProvider'),
                    viewerMode: document.getElementById('viewerMode'),
                    viewerStatus: document.getElementById('viewerStatus'),
                    sceneHotspots: document.getElementById('sceneHotspots'),
                    immersiveStops: document.getElementById('immersiveStops'),
                    immersiveDrawer: document.getElementById('immersiveDrawer'),
                    drawerEyebrow: document.getElementById('drawerEyebrow'),
                    drawerTitleText: document.getElementById('drawerTitleText'),
                    drawerSubtitleText: document.getElementById('drawerSubtitleText'),
                    drawerCloseBtn: document.getElementById('drawerCloseBtn'),
                    drawerButtons: Array.from(document.querySelectorAll('[data-drawer-target]')),
                    drawerSections: {
                        scene: document.getElementById('drawer-scene'),
                        guide: document.getElementById('drawer-guide'),
                        related: document.getElementById('drawer-related')
                    },
                    guideList: document.getElementById('guideList'),
                    panelTitle: document.getElementById('panelTitle'),
                    panelMeta: document.getElementById('panelMeta'),
                    panelDescription: document.getElementById('panelDescription'),
                    statHotspots: document.getElementById('statHotspots'),
                    statDrawings: document.getElementById('statDrawings'),
                    statTimeline: document.getElementById('statTimeline'),
                    cameraLabel: document.getElementById('cameraLabel'),
                    cameraHint: document.getElementById('cameraHint'),
                    sceneTipText: document.getElementById('sceneTipText'),
                    rotateLeftBtn: document.getElementById('rotateLeftBtn'),
                    rotateRightBtn: document.getElementById('rotateRightBtn'),
                    zoomInBtn: document.getElementById('zoomInBtn'),
                    zoomOutBtn: document.getElementById('zoomOutBtn'),
                    zoomResetBtn: document.getElementById('zoomResetBtn'),
                    relatedTabs: document.getElementById('relatedTabs'),
                    relatedPanels: Array.from(document.querySelectorAll('.related-panel')),
                    storyPanel: document.getElementById('panel-story'),
                    galleryPanel: document.getElementById('panel-gallery'),
                    drawingsPanel: document.getElementById('panel-drawings'),
                    timelinePanel: document.getElementById('panel-timeline')
                }
            });

            runtime.mount();
        })();
    </script>
</body>
</html>
